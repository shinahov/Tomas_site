name: Deploy Design 4 site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare Design 4 site
        run: |
          mkdir -p _site
          cp web-presentations/index.html web-presentations/landing.css web-presentations/landing.js web-presentations/.nojekyll _site/
          cp -R web-presentations/assets web-presentations/downloads web-presentations/shared web-presentations/short web-presentations/long _site/

      - name: Upload Design 4 site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
